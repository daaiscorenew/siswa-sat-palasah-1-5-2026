var _dbCache={};

function getDB(k){
  if(_dbCache[k]) return _dbCache[k];
  if(!FIREBASE_CONFIGS[k]) return null;
  try{
    var app=firebase.initializeApp(FIREBASE_CONFIGS[k],"sdb_"+k.replace(/\s/g,"_"));
    var db=firebase.firestore(app);
    db.settings({experimentalAutoDetectLongPolling:true});
    _dbCache[k]=db;
    return db;
  }catch(e){
    console.error("Gagal inisialisasi DB untuk " + k, e);
    return null;
  }
}

<script>
var uState = {
  tokenData: null, siswaData: null, soalList: [], currentQ: 0,
  timerInterval: null, waktuSisa: 0, isOnline: navigator.onLine,
  mapel: '', kelas: '', rombelSiswa: '', isSubmitted: false, offlineSaved: false,
  pgIndices: [], urIndices: [], pgCount: 0, urCount: 0, isSubmitting: false,
  jawabanById: {},
  isTypingEssay: false // PERBAIKAN 3: Penanda agar anti cheat tidak keluar saat mengetik
};

// Anti-Cheat & Security Listeners
document.addEventListener('contextmenu', function(e){e.preventDefault()});
document.addEventListener('copy', function(e){e.preventDefault()});
document.addEventListener('paste', function(e){e.preventDefault()});
document.addEventListener('selectstart', function(e){ if(e.target && e.target.tagName === 'TEXTAREA') return true; e.preventDefault(); });
document.addEventListener('keydown', function(e){ if(e.ctrlKey && (e.key==='c'||e.key==='u'||e.key==='p'||e.key==='s')) e.preventDefault(); if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))) e.preventDefault(); });

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='hidden' && uState.soalList.length>0 && !document.getElementById('examPage').classList.contains('hidden') && !uState.isSubmitted && !uState.isSubmitting){
    document.getElementById('cheatOverlay').classList.remove('hidden');
  }
});

// PERBAIKAN 4: Window blurignore jika sedang mengetik uraian
window.addEventListener('blur', function(){
  if(uState.isTypingEssay) return; 
  if(uState.soalList.length>0 && !document.getElementById('examPage').classList.contains('hidden') && !uState.isSubmitted){
    document.getElementById('cheatOverlay').classList.remove('hidden');
  }
});

function returnToExam(){ document.getElementById('cheatOverlay').classList.add('hidden'); goFullscreen(); }
function goFullscreen(){ var el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); }
document.addEventListener('fullscreenchange', function(){ if(!document.fullscreenElement && uState.soalList.length>0 && !document.getElementById('examPage').classList.contains('hidden') && !uState.isSubmitted){ setTimeout(function(){if(!document.fullscreenElement) goFullscreen()},500); }});
window.addEventListener('online', function(){uState.isOnline=true;updateConnUI();checkPending()});
window.addEventListener('offline', function(){uState.isOnline=false;updateConnUI()});

function updateConnUI(){ var el=document.getElementById('connectionStatus');if(!el)return; el.innerHTML=uState.isOnline ?'<span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span><span class="text-[10px] text-success font-bold">ONLINE</span>' :'<span class="w-1.5 h-1.5 rounded-full bg-danger" style="animation:pulse-glow 1s infinite"></span><span class="text-[10px] text-danger font-bold">OFFLINE</span>'; }
function showToast(m,t){ t=t||'success';var c=document.getElementById('toastContainer'),e=document.createElement('div'); e.className='toast toast-'+t; e.innerHTML='<i class="fas fa-'+(t==='success'?'check-circle':t==='warning'?'exclamation-triangle':'times-circle')+'"></i><span>'+m+'</span>'; c.appendChild(e);setTimeout(function(){if(e.parentNode)e.remove()},4000); }

function doLogin(){
  var nisn=document.getElementById('iNISN').value.trim(); var token=document.getElementById('iToken').value.trim().toUpperCase();
  if(!nisn||!token){showToast('NISN dan Token wajib diisi','error');return}
  var btn=document.getElementById('btnLogin');btn.disabled=true;btn.innerHTML='<i class="fas fa-circle-notch fa-spin mr-2"></i>Mencari Token...';
  
  var dbs=["Kelas 1","Kelas 2","Kelas 3","Kelas 4","Kelas 5"];
  Promise.all(dbs.map(function(k){ var db=getDB(k);if(!db)return Promise.resolve(null); return db.collection('tokens').where('token','==',token).limit(1).get().then(function(s){return s.empty?null:{data:s.docs[0].data(),kelas:k}}).catch(function(){return null}); })).then(function(results){
    var foundToken=null,foundKelas='';
    for(var i=0;i<results.length;i++){if(results[i]){foundToken=results[i].data;foundKelas=results[i].kelas;break}}
    if(!foundToken){btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';showToast('Token tidak ditemukan','error');return}
    
    var end=foundToken.endTime?foundToken.endTime.toDate().getTime():0;
    if(end > 0 && Date.now()>end){showToast('Waktu ujian sudah habis','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';return}
    
    var db=getDB(foundKelas);
    return db.collection('siswa').where('nisn','==',nisn).limit(1).get().then(function(snap){
      if(snap.empty){showToast('NISN tidak terdaftar','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';return null}
      var siswa=snap.docs[0].data(); var rombelSiswa = siswa.rombel || 'A'; if(Array.isArray(rombelSiswa)) rombelSiswa = rombelSiswa[0] || 'A';
      var tokenRombelArr = Array.isArray(foundToken.rombel) ? foundToken.rombel : [foundToken.rombel];
      if(tokenRombelArr.indexOf(rombelSiswa) === -1){ showToast('Rombel Anda tidak diizinkan','error'); btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';return null; }
      
      return db.collection('nilai').doc(foundKelas+'_'+rombelSiswa+'_'+foundToken.mapel+'_'+nisn).get().then(function(valDoc){
        if(valDoc.exists){showToast('Anda sudah mengerjakan ujian ini','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';return null}
        return {tokenData:foundToken, kelas:foundKelas, siswa:siswa, rombelSiswa:rombelSiswa};
      });
    });
  }).then(function(data){ 
    if(!data) return; 
    uState.tokenData=data.tokenData; uState.kelas=data.kelas; uState.siswaData=data.siswa; uState.mapel=data.tokenData.mapel; uState.rombelSiswa=data.rombelSiswa; 
    startExam(); 
  }).catch(function(e){ 
    console.error(e);btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>MASUK UJIAN';showToast('Koneksi error','error'); 
  });
}

function startExam(){
  var db=getDB(uState.kelas);if(!db){showToast('Database Error','error');return}
  showToast('Mengunduh soal...','warning');
  db.collection('questions').where('mapel','==',uState.mapel).where('kelas','==',uState.kelas).get().then(function(snap){
    var docs=[];
    snap.forEach(function(d){ var dt = d.data(); dt.docId = d.id; docs.push(dt); });
    if(!docs.length){showToast('Belum ada soal. Hubungi Guru.','error');return}

    docs.sort(function(a,b){
      var ta = a.createdAt ? (a.createdAt.seconds || 0) : 0;
      var tb = b.createdAt ? (b.createdAt.seconds || 0) : 0;
      return ta - tb;
    });
    docs.sort(function(a,b){
      var ta = a.type === 'pg' ? 0 : 1;
      var tb = b.type === 'pg' ? 0 : 1;
      return ta - tb;
    });

    uState.soalList=docs; uState.pgIndices=[]; uState.urIndices=[];
    docs.forEach(function(q,i){ if(q.type==='pg')uState.pgIndices.push(i); else uState.urIndices.push(i); });
    uState.pgCount=uState.pgIndices.length; uState.urCount=uState.urIndices.length;
    
    var end=uState.tokenData.endTime?uState.tokenData.endTime.toDate().getTime():0;
    uState.waktuSisa = end > 0 ? Math.max(0,Math.floor((end-Date.now())/1000)) : 9999999;
    document.getElementById('authPage').style.display='none'; document.getElementById('examPage').classList.remove('hidden');
    document.getElementById('footerSiswaName').textContent=uState.siswaData.nama;
    var mapelName=(MAPEL_LIST.find(function(m){return m.id===uState.mapel})||{}).nama||uState.mapel;
    document.getElementById('infoMapelHeader').textContent=mapelName+' — '+uState.kelas+' Rombel '+uState.rombelSiswa;
    goFullscreen(); renderQ(); startTimer(); showToast('Soal siap! Kerjakan dengan jujur.');
  }).catch(function(e){showToast('Gagal memuat soal','error')});
}

function startTimer(){ updateTimerUI(); uState.timerInterval=setInterval(function(){ uState.waktuSisa--;updateTimerUI(); if(uState.waktuSisa<=0){clearInterval(uState.timerInterval);autoFinish()} },1000); }
function updateTimerUI(){ var m=Math.floor(uState.waktuSisa/60),s=uState.waktuSisa%60; var d=document.getElementById('timerDisplay'); d.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s; d.className=uState.waktuSisa<=300 ?'font-mono font-bold text-danger text-xl leading-none tabular-nums animate-pulse' :'font-mono font-bold text-warning text-xl leading-none tabular-nums'; }

function renderQ(){
  var q=uState.soalList[uState.currentQ], total=uState.soalList.length;
  var qId = q.docId || q.id;
  var currentAnswer = uState.jawabanById[qId] || '';
  
  document.getElementById('soalCounter').textContent='Soal '+(uState.currentQ+1)+' / '+total;
  var dh='';for(var i=0;i<total;i++){ 
    var qIdLoop = uState.soalList[i].docId || uState.soalList[i].id;
    var cls = uState.jawabanById[qIdLoop] ? 'bg-success/60' : 'bg-border hover:bg-muted'; 
    if(i===uState.currentQ) cls = uState.jawabanById[qIdLoop] ? 'bg-success scale-125 shadow-lg' : 'bg-kopAccent scale-125 shadow-lg'; 
    dh+='<div onclick="jumpQ('+i+')" class="w-2.5 h-2.5 rounded-full cursor-pointer transition-all '+cls+' flex-shrink-0"></div>'; 
  }
  document.getElementById('navDots').innerHTML=dh;
  document.getElementById('qText').innerHTML = '<span class="text-kopAccent font-bold mr-2">'+(uState.currentQ+1)+'.</span>'+(q.text||'');
  var oe=document.getElementById('qOptions');
  if(q.type==='pg'&&q.options){
    var h='';q.options.forEach(function(o,i){ var ltr=String.fromCharCode(65+i); var sel=currentAnswer===ltr; h+='<div class="opt-btn rounded-xl p-4 flex items-start gap-4 '+(sel?'selected':'')+'" onclick="pilihJawaban(\''+ltr+'\')"><div class="w-8 h-8 rounded-full border-2 flex items-center justify-center flex-shrink-0 font-bold text-sm '+(sel?'border-kopAccent bg-kopAccent text-kop':'border-border text-muted')+'">'+ltr+'</div><div class="text-light text-base pt-1 flex-1 leading-relaxed">'+o+'</div></div>'; });oe.innerHTML=h;
  }else{ 
    oe.innerHTML='<div class="space-y-4"><div class="p-4 rounded-xl bg-warning/10 border border-warning/30 text-warning text-sm flex items-start gap-2"><i class="fas fa-pen-nib mt-1"></i><div><strong>Soal Uraian.</strong> Ketik jawaban Anda dengan jelas.</div></div><textarea class="essay-textarea" id="essayAnswer" placeholder="Ketik jawaban di sini..." oninput="simpanUraian(this.value)" onfocus="uState.isTypingEssay=true" onblur="uState.isTypingEssay=false">'+currentAnswer+'</textarea></div>'; 
  }
  document.getElementById('btnPrev').disabled=uState.currentQ===0; var isLast=uState.currentQ===total-1; document.getElementById('btnNext').innerHTML=isLast?'SELESAI <i class="fas fa-check ml-2"></i>':'SELANJUTNYA <i class="fas fa-chevron-right ml-2"></i>'; document.querySelector('main').scrollTop=0;
}

function prevQ(){if(uState.currentQ>0){uState.currentQ--;renderQ()}}
function nextQ(){ if(uState.currentQ<uState.soalList.length-1){uState.currentQ++;renderQ()} else confirmFinish(); }
function jumpQ(i){uState.currentQ=i;renderQ()}

function pilihJawaban(ltr){ 
  var q = uState.soalList[uState.currentQ]; 
  var qId = q.docId || q.id;
  uState.jawabanById[qId] = ltr;
  renderQ(); 
}

function simpanUraian(val){ 
  var q = uState.soalList[uState.currentQ]; 
  var qId = q.docId || q.id;
  if(val.trim()) {
    uState.jawabanById[qId] = val;
  } else {
    delete uState.jawabanById[qId];
  }
  renderQ(); 
}

function autoFinish(){if(!uState.isSubmitted){showToast('Waktu Habis!','warning');doFinish()}}
function confirmFinish(){
  if(uState.isSubmitting) return; 
  var dijawab = Object.keys(uState.jawabanById).length;
  var total=uState.soalList.length, blm=total-dijawab;
  var h='<div class="glass rounded-2xl p-8 text-center fade-in"><div class="w-16 h-16 rounded-full bg-warning/20 border-2 border-warning text-warning flex items-center justify-center mx-auto mb-4"><i class="fas fa-question-circle text-2xl"></i></div><h3 class="text-light font-bold text-xl mb-2">Kumpulkan Jawaban?</h3><div class="grid grid-cols-2 gap-4 my-6"><div class="bg-dark/50 p-3 rounded-lg border border-border"><div class="text-xs text-muted">Dijawab</div><div class="text-success font-bold text-xl">'+dijawab+'</div></div><div class="bg-dark/50 p-3 rounded-lg border border-border"><div class="text-xs text-muted">Belum</div><div class="text-danger font-bold text-xl">'+blm+'</div></div></div>';
  h+='<div class="flex gap-3"><button onclick="closeFinishModal()" class="flex-1 px-4 py-3 bg-dark border border-border text-muted rounded-xl font-bold text-sm hover:bg-card">LANJUT</button><button onclick="doFinish()" class="flex-1 px-4 py-3 bg-danger text-white rounded-xl font-bold text-sm hover:bg-red-600 shadow-lg">KIRIM</button></div></div>';
  document.getElementById('resultContent').innerHTML=h; document.getElementById('resultPage').classList.remove('hidden');
}
function closeFinishModal(){document.getElementById('resultPage').classList.add('hidden')}

function doFinish(){
  if(uState.isSubmitted || uState.isSubmitting) return;
  uState.isSubmitting = true; 
  clearInterval(uState.timerInterval); uState.isSubmitted=true;

  var jawabanPGArray = [];
  var jawabanUrArray = [];
  var skorPerSoalUrArray = [];
  var soalPGIds = []; 
  var soalUrIds = []; 
  var pgBenar = 0;
  var pgSalah = 0;
  var urDijawab = 0;

  uState.soalList.forEach(function(q, i){
    var qId = q.docId || q.id;
    var jawab = uState.jawabanById[qId] || '';
    
    if(q.type === 'pg'){
      var kunci = q.answer || '';
      if(jawab && jawab.toString().toUpperCase().trim() === kunci.toString().toUpperCase().trim()){
        pgBenar++;
      } else if(jawab) {
        pgSalah++;
      }
      jawabanPGArray.push(jawab);
      soalPGIds.push(qId);
    } else {
      if(jawab.trim() !== '') urDijawab++;
      jawabanUrArray.push(jawab);
      skorPerSoalUrArray.push(0);
      soalUrIds.push(qId);
    }
  });

  var docId=uState.kelas+'_'+uState.rombelSiswa+'_'+uState.mapel+'_'+uState.siswaData.nisn;
  var payload={
    kelas: uState.kelas, rombel: uState.rombelSiswa, mapel: uState.mapel,
    nisn: String(uState.siswaData.nisn), nama: uState.siswaData.nama,
    npsn: uState.siswaData.npsn || uState.tokenData.npsn,
    guruNip: uState.tokenData.guruNip, guruNama: uState.tokenData.guruNama,
    sekolah: uState.tokenData.sekolah||'',
    pgBenar: pgBenar, pgSalah: pgSalah,
    pgCount: uState.pgCount, urCount: uState.urCount, urDijawab: urDijawab,
    nilaiPG: 0, nilaiUr: 0, nilaiTotal: 0,
    jawabanPG: jawabanPGArray, 
    jawabanUr: jawabanUrArray,      
    skorPerSoalUr: skorPerSoalUrArray,
    soalPG_Ids: soalPGIds,
    soalUr_Ids: soalUrIds,
    submittedBy: 'siswa_online', 
    tokenUsed: uState.tokenData.token,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if(uState.isOnline){sendToFirebase(payload,docId);} else{saveOffline(payload,docId);showResult(pgBenar, pgSalah, urDijawab);}
}

function sendToFirebase(payload,docId){
  var db=getDB(uState.kelas); var ref=db.collection('nilai').doc(docId);
  ref.set(payload, {merge: true}).then(function(){
    showResult(payload.pgBenar, payload.pgSalah, payload.urDijawab);
  }).catch(function(e){ saveOffline(payload,docId); showResult(payload.pgBenar, payload.pgSalah, payload.urDijawab); });
}

function saveOffline(payload,docId){ try{payload._docId=docId;localStorage.setItem('sat_pending_'+uState.siswaData.nisn,JSON.stringify(payload));uState.offlineSaved=true;showToast('Tersimpan offline!','warning');showSaveBar()}catch(e){} }
function clearOfflineSave(){try{localStorage.removeItem('sat_pending_'+uState.siswaData.nisn);uState.offlineSaved=false;hideSaveBar()}catch(e){}}

// PERBAIKAN 5: Check offline data yang lebih aman
function checkPending(){ 
  try{ 
    for(var i=0;i<localStorage.length;i++){ 
      var key=localStorage.key(i); 
      if(key && key.startsWith('sat_pending_')){ 
        var raw = localStorage.getItem(key);
        var data = JSON.parse(raw); 
        if(data && data.nisn && data._docId){ 
          showToast('Mengirim jawaban tersimpan...','warning'); 
          var db=getDB(data.kelas); 
          var docId=data._docId;
          delete data._docId; 
          db.collection('nilai').doc(docId).set(data, {merge: true}).then(function(){ 
            localStorage.removeItem(key);hideSaveBar();showToast('Berhasil dikirim!'); 
          }).catch(function(){}); 
        } 
      } 
    } 
  }catch(e){} 
}

function showSaveBar(){if(document.getElementById('saveBar'))return;var b=document.createElement('div');b.id='saveBar';b.className='save-bar';b.innerHTML='<i class="fas fa-exclamation-triangle mr-2"></i>Jawaban tersimpan offline. Cari sinyal!';document.body.appendChild(b)}
function hideSaveBar(){var b=document.getElementById('saveBar');if(b)b.remove()}

function showResult(pgBenar, pgSalah, urDijawab){
  document.getElementById('examPage').classList.add('hidden'); document.getElementById('cheatOverlay').classList.add('hidden');
  try{if(document.fullscreenElement)document.exitFullscreen();}catch(e){}
  var pgKosong = uState.pgCount - pgBenar - pgSalah;
  var urKosong = uState.urCount - urDijawab;
  
  var h='<div class="glass rounded-2xl p-6 md:p-8 text-center result-card relative overflow-hidden">';
  h+='<div class="w-20 h-20 rounded-full bg-gradient-to-br from-success/30 to-success/10 border-2 border-success flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-check-double text-success text-3xl"></i></div>';
  h+='<h2 class="text-light font-bold text-xl md:text-2xl mb-1">Ujian Selesai!</h2>';
  h+='<p class="text-muted text-xs md:text-sm mb-6">Jawaban berhasil dikirim ke Guru.</p>';
  h+='<div class="bg-info/10 p-4 rounded-xl border border-info/30 mb-4 text-left">';
  h+='<div class="text-info font-bold text-sm mb-3 flex items-center gap-2"><i class="fas fa-list-ol"></i> Pilihan Ganda</div>';
  h+='<div class="grid grid-cols-3 gap-2 text-center">';
  h+='<div class="bg-dark/50 p-2 rounded-lg"><div class="text-[10px] text-muted">Benar</div><div class="text-2xl font-bold text-success">'+pgBenar+'</div></div>';
  h+='<div class="bg-dark/50 p-2 rounded-lg"><div class="text-[10px] text-muted">Salah</div><div class="text-2xl font-bold text-danger">'+pgSalah+'</div></div>';
  h+='<div class="bg-dark/50 p-2 rounded-lg"><div class="text-[10px] text-muted">Kosong</div><div class="text-2xl font-bold text-muted">'+pgKosong+'</div></div>';
  h+='</div></div>';
  h+='<div class="bg-warning/10 p-4 rounded-xl border border-warning/30 mb-6 text-left">';
  h+='<div class="text-warning font-bold text-sm mb-3 flex items-center gap-2"><i class="fas fa-pen-nib"></i> Uraian</div>';
  h+='<div class="grid grid-cols-2 gap-2 text-center">';
  h+='<div class="bg-dark/50 p-2 rounded-lg"><div class="text-[10px] text-muted">Dijawab</div><div class="text-2xl font-bold text-warning">'+urDijawab+'</div></div>';
  h+='<div class="bg-dark/50 p-2 rounded-lg"><div class="text-[10px] text-muted">Kosong</div><div class="text-2xl font-bold text-muted">'+urKosong+'</div></div>';
  h+='</div></div>';
  h+='<div class="mt-2 pt-4 border-t border-border text-[10px] text-muted text-center leading-relaxed bg-dark/20 rounded p-2"><i class="fas fa-info-circle mr-1 text-kopAccent"></i> Nilai akhir diumumkan Guru setelah koreksi.</div>';
  h+='</div>';
  
  document.getElementById('resultContent').innerHTML=h; document.getElementById('resultPage').classList.remove('hidden');
}

window.onload=function(){ checkPending(); }
</script>
</body>
</html>
